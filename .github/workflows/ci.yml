name: CI

on:
  push:
    branches: [ main, version-15, version-16 ]
  pull_request:
    branches: [ main, version-15, version-16 ]

concurrency:
  group: develop-commission_engine-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  linter:
    name: Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check . --config pyproject.toml

  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mariadb-admin ping" --health-interval=5s --health-timeout=2s --health-retries=3

      redis-cache:
        image: redis:alpine
        ports:
          - 13000:6379

      redis-queue:
        image: redis:alpine
        ports:
          - 11000:6379

    steps:
      - name: Clone
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          check-latest: true

      - name: Install Frappe
        env:
          DB_ROOT_PASSWORD: root
        run: |
          pip install frappe-bench
          bench init --skip-redis-config-generation --frappe-branch version-16 ~/frappe-bench
          mysql --host 127.0.0.1 --port 3306 -uroot -proot -e "SET GLOBAL character_set_server = 'utf8mb4';"
          mysql --host 127.0.0.1 --port 3306 -uroot -proot -e "SET GLOBAL collation_server = 'utf8mb4_unicode_ci';"

      - name: Install App
        working-directory: /home/runner/frappe-bench
        run: |
          bench get-app commission_engine $GITHUB_WORKSPACE
          bench setup requirements --dev
          bench new-site --db-root-password root --admin-password admin test_site
          bench --site test_site install-app commission_engine
          bench build --app commission_engine
        env:
          CI: 'Yes'

      - name: Run Tests
        working-directory: /home/runner/frappe-bench
        run: |
          bench --site test_site set-config allow_tests true
          bench --site test_site run-tests --app commission_engine
        env:
          TYPE: server
